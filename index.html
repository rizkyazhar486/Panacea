  <body>
    <div id="root"></div>
    <!-- Splash screen — pure inline HTML/CSS so it paints before any JS loads
         (the actual first visual, not a fake one bolted on after mount).
         Removed by main.tsx once the app has mounted, with a floor so it
         never flashes imperceptibly on a fast connection. -->
    <div id="pmd-splash" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#00BF63,#0B7A4B);transition:opacity .45s ease;">
      <img src="./logo-mark.png" alt="" width="72" height="72" style="border-radius:20px;animation:pmd-splash-pulse 1.3s ease-in-out infinite;box-shadow:0 12px 32px rgba(0,0,0,0.25);" />
    </div>
    <style>@keyframes pmd-splash-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.88}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
